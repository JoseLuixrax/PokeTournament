<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Draft Tournament</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d1a;
      --bg2: #13132b;
      --bg3: #1a1a3a;
      --surface: #1e1e40;
      --surface2: #252550;
      --border: #2e2e60;
      --border2: #4040a0;
      --accent: #7c3aed;
      --accent2: #a855f7;
      --accent3: #c084fc;
      --gold: #f59e0b;
      --gold2: #fbbf24;
      --red: #ef4444;
      --green: #22c55e;
      --blue: #3b82f6;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --glow: rgba(124, 58, 237, 0.3);
      --glow2: rgba(168, 85, 247, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255, 255, 255, 0.01) 40px, rgba(255, 255, 255, 0.01) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255, 255, 255, 0.01) 40px, rgba(255, 255, 255, 0.01) 41px);
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #1a0540 0%, #0d0d1a 50%, #1a0d30 100%);
      border-bottom: 1px solid var(--border2);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(124, 58, 237, 0.2);
    }

    .header-logo {
      width: 48px;
      height: 48px;
      background: radial-gradient(circle, #f59e0b, #dc2626);
      border-radius: 50%;
      border: 3px solid var(--gold2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
      flex-shrink: 0;
    }

    header h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--gold2);
      text-shadow: 0 0 20px rgba(245, 158, 11, 0.5), 2px 2px 0 rgba(0, 0, 0, 0.8);
      line-height: 1.4;
    }

    header h1 span {
      color: var(--accent3);
      display: block;
      font-size: 10px;
      margin-top: 4px;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
    }

    /* BUTTONS */
    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent2);
      color: white;
      box-shadow: 0 0 12px var(--glow);
    }

    .btn-primary:hover {
      background: var(--accent2);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border2);
      color: var(--text);
    }

    .btn-secondary:hover {
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .btn-gold {
      background: linear-gradient(135deg, #d97706, #f59e0b);
      border-color: var(--gold2);
      color: #1a0d00;
      font-weight: 700;
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
    }

    .btn-gold:hover {
      box-shadow: 0 0 24px rgba(245, 158, 11, 0.5);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 11px;
    }

    .btn-icon {
      padding: 8px;
      min-width: 36px;
      justify-content: center;
    }

    /* MAIN LAYOUT */
    .main {
      display: flex;
      height: calc(100vh - 81px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
    }

    .sidebar-header h2 {
      font-size: 11px;
      font-family: 'Press Start 2P', monospace;
      color: var(--accent3);
      margin-bottom: 0.75rem;
      text-shadow: 0 0 10px var(--glow);
    }

    .players-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .players-list::-webkit-scrollbar {
      width: 4px;
    }

    .players-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .players-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .player-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.15s;
      cursor: grab;
    }

    .player-item:hover {
      border-color: var(--border2);
      background: var(--surface2);
    }

    .player-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 13px;
      color: white;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .player-name-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      min-width: 0;
    }

    .player-name-input::placeholder {
      color: var(--text3);
    }

    .add-player-input {
      display: flex;
      gap: 0.5rem;
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .text-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px var(--glow2);
    }

    .text-input::placeholder {
      color: var(--text3);
    }

    /* TABS */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .tabs-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding: 0 0.5rem;
      flex-shrink: 0;
    }

    .tabs-bar::-webkit-scrollbar {
      height: 2px;
    }

    .tabs-bar::-webkit-scrollbar-thumb {
      background: var(--border2);
    }

    .tab-btn {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.03);
    }

    .tab-btn.active {
      color: var(--accent3);
      border-bottom-color: var(--accent);
      background: rgba(124, 58, 237, 0.08);
    }

    .tab-badge {
      font-size: 10px;
      background: var(--accent);
      color: white;
      padding: 1px 6px;
      border-radius: 20px;
      font-weight: 700;
    }

    .add-tab-btn {
      font-size: 18px;
      padding: 0.5rem 0.75rem;
      color: var(--text3);
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .add-tab-btn:hover {
      color: var(--accent3);
      background: rgba(124, 58, 237, 0.1);
    }

    /* ARENA */
    .arena {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .arena::-webkit-scrollbar {
      width: 6px;
    }

    .arena::-webkit-scrollbar-track {
      background: transparent;
    }

    .arena::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* MATCHUP */
    .matchup {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 1.5rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .matchup:hover {
      border-color: var(--border2);
    }

    .matchup-header {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(168, 85, 247, 0.08));
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--accent3);
    }

    .vs-badge {
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-family: 'Press Start 2P', monospace;
      box-shadow: 0 0 10px rgba(124, 58, 237, 0.4);
    }

    .matchup-slots {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 0;
    }

    .slot {
      padding: 1rem;
      min-height: 140px;
      transition: background 0.15s;
      position: relative;
    }

    .slot.drag-over {
      background: rgba(124, 58, 237, 0.12);
    }

    .slot-placeholder {
      width: 100%;
      height: 100%;
      min-height: 120px;
      border: 2px dashed var(--border2);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text3);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .slot-placeholder:hover {
      border-color: var(--accent);
      color: var(--accent3);
      background: rgba(124, 58, 237, 0.05);
    }

    .slot-placeholder .ph-icon {
      font-size: 28px;
      opacity: 0.5;
    }

    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 0.5rem;
      background: rgba(124, 58, 237, 0.05);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .vs-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 16px;
      color: var(--accent2);
      text-shadow: 0 0 20px var(--glow);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
    }

    /* PLAYER CARD */
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: grab;
      transition: all 0.15s;
      height: 100%;
    }

    .player-card:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 20px var(--glow);
    }

    .player-card.dragging {
      opacity: 0.3;
    }

    .card-header {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.3), rgba(168, 85, 247, 0.1));
      padding: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .card-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.4);
      text-transform: uppercase;
    }

    .card-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      flex: 1;
    }

    .card-round-badge {
      font-size: 10px;
      background: rgba(124, 58, 237, 0.3);
      border: 1px solid rgba(168, 85, 247, 0.4);
      color: var(--accent3);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .card-body {
      padding: 0.75rem;
    }

    /* POKEMON PICKS */
    .picks-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }

    .pick-slot {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: all 0.15s;
      position: relative;
    }

    .pick-slot:has(.pick-select:focus) {
      border-color: var(--accent2);
      box-shadow: 0 0 8px var(--glow2);
    }

    .pick-pokemon-img {
      display: block;
      width: 48px;
      height: 48px;
      margin: 0.25rem auto 0;
      image-rendering: pixelated;
    }

    .pick-select {
      display: none;
    }

    /* hidden, replaced by pokepicker */

    /* POKEPICKER custom dropdown */
    .pokepicker {
      position: relative;
      width: 100%;
    }

    .pokepicker-trigger {
      width: 100%;
      background: transparent;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 11px;
      padding: 4px 6px;
      cursor: pointer;
      text-align: center;
      text-transform: capitalize;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background 0.1s;
      display: block;
    }

    .pokepicker-trigger:hover {
      background: rgba(124, 58, 237, 0.1);
      color: var(--accent3);
    }

    .pokepicker-trigger.has-value {
      color: var(--accent3);
      font-weight: 600;
    }

    .pokepicker-dropdown {
      display: none;
      position: fixed;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px var(--glow2);
      z-index: 9000;
      width: 200px;
      overflow: hidden;
    }

    .pokepicker-dropdown.open {
      display: block;
    }

    .pokepicker-search {
      width: 100%;
      background: var(--bg3);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
    }

    .pokepicker-search::placeholder {
      color: var(--text3);
    }

    .pokepicker-list {
      max-height: 220px;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    .pokepicker-list::-webkit-scrollbar {
      width: 4px;
    }

    .pokepicker-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .pokepicker-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 13px;
      text-transform: capitalize;
      transition: background 0.1s;
      color: var(--text);
    }

    .pokepicker-item:hover,
    .pokepicker-item.focused {
      background: rgba(124, 58, 237, 0.15);
      color: var(--accent3);
    }

    .pokepicker-item.selected {
      background: rgba(124, 58, 237, 0.25);
      color: var(--accent3);
      font-weight: 600;
    }

    .pokepicker-item img {
      width: 28px;
      height: 28px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .pokepicker-clear {
      display: block;
      width: 100%;
      padding: 6px;
      background: rgba(239, 68, 68, 0.1);
      border: none;
      border-top: 1px solid var(--border);
      color: #fca5a5;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s;
    }

    .pokepicker-clear:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .pokepicker-empty {
      padding: 12px;
      text-align: center;
      color: var(--text3);
      font-size: 12px;
    }

    .pick-num {
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 9px;
      font-family: 'Press Start 2P', monospace;
      color: var(--accent3);
      opacity: 0.7;
    }

    /* UNASSIGNED PLAYERS */
    .unassigned-section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .unassigned-header {
      font-size: 10px;
      font-family: 'Press Start 2P', monospace;
      color: var(--text3);
      margin-bottom: 0.75rem;
    }

    .unassigned-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .unassigned-player {
      background: var(--surface);
      border: 1px dashed var(--border2);
      border-radius: 10px;
      padding: 0.5rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: grab;
      transition: all 0.15s;
    }

    .unassigned-player:hover {
      border-color: var(--accent2);
      background: var(--surface2);
    }

    /* ADD MATCHUP */
    .add-matchup-btn {
      width: 100%;
      padding: 1rem;
      background: var(--bg2);
      border: 2px dashed var(--border2);
      border-radius: 16px;
      color: var(--text3);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .add-matchup-btn:hover {
      border-color: var(--accent2);
      color: var(--accent3);
      background: rgba(124, 58, 237, 0.05);
      box-shadow: 0 0 20px var(--glow2);
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow2);
    }

    .modal h2 {
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      color: var(--gold2);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 15px rgba(245, 158, 11, 0.4);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* LOADING */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      z-index: 9999;
      transition: width 0.3s;
      box-shadow: 0 0 10px var(--glow);
    }

    /* SCROLLABLE INNER */
    .slot-inner {
      height: 100%;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1rem;
      color: var(--text3);
      text-align: center;
    }

    .empty-icon {
      font-size: 64px;
      opacity: 0.3;
    }

    .empty-state h3 {
      font-family: 'Press Start 2P', monospace;
      font-size: 11px;
      color: var(--text2);
    }

    .empty-state p {
      font-size: 14px;
    }

    /* TAB DELETE */
    .tab-close {
      font-size: 14px;
      color: var(--text3);
      margin-left: 4px;
      transition: color 0.1s;
      line-height: 1;
    }

    .tab-btn:hover .tab-close {
      color: var(--red);
    }

    /* BAN SECTION */
    .ban-section {
      border-top: 1px solid var(--border);
      padding: 0.6rem 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239, 68, 68, 0.04);
    }

    .ban-label {
      font-size: 9px;
      font-family: 'Press Start 2P', monospace;
      color: #ef4444;
      opacity: 0.8;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .ban-slot {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239, 68, 68, 0.08);
      border: 1px dashed rgba(239, 68, 68, 0.35);
      border-radius: 8px;
      padding: 4px 8px;
      min-height: 36px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .ban-slot:hover {
      border-color: rgba(239, 68, 68, 0.6);
      background: rgba(239, 68, 68, 0.14);
    }

    .ban-slot.has-ban {
      border-style: solid;
      border-color: rgba(239, 68, 68, 0.5);
    }

    .ban-pokemon-img {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .ban-name {
      font-size: 12px;
      font-weight: 700;
      color: #fca5a5;
      text-transform: capitalize;
      flex: 1;
    }

    .ban-placeholder {
      font-size: 12px;
      color: rgba(239, 68, 68, 0.45);
      flex: 1;
    }

    .ban-clear {
      background: none;
      border: none;
      color: rgba(239, 68, 68, 0.5);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px;
      transition: color 0.1s;
      flex-shrink: 0;
    }

    .ban-clear:hover {
      color: #ef4444;
    }

    .tooltip {
      position: relative;
    }

    .tooltip::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 999;
    }

    .tooltip:hover::after {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar {
        width: 220px;
      }

      header h1 {
        font-size: 10px;
      }
    }

    .remove-player-btn {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px;
      transition: color 0.1s;
    }

    .remove-player-btn:hover {
      color: var(--red);
    }

    .matchup-footer {
      border-top: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .winner-badge {
      font-size: 10px;
      font-family: 'Press Start 2P', monospace;
      color: var(--gold2);
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.3);
      padding: 4px 10px;
      border-radius: 20px;
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
    }
  </style>
</head>

<body>

  <div class="loading-bar" id="loadingBar" style="width:0%"></div>

  <header>
    <div class="header-logo">⚔️</div>
    <div>
      <h1>POKÉMON DRAFT<span>Tournament Manager</span></h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('importFile').click()">📂
        Importar</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-secondary btn-sm" onclick="exportData()">💾 Exportar</button>
      <button class="btn btn-gold btn-sm" onclick="openAddTabModal()">+ Nueva Ronda</button>
    </div>
  </header>

  <div class="main">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>👥 Jugadores</h2>
        <div class="add-player-input">
          <input type="text" class="text-input" id="newPlayerName" placeholder="Nombre jugador..." maxlength="20"
            onkeydown="if(event.key==='Enter')addPlayer()">
          <button class="btn btn-primary btn-icon" onclick="addPlayer()" title="Añadir jugador">+</button>
        </div>
      </div>
      <div class="players-list" id="playersList"></div>
    </aside>

    <!-- CONTENT -->
    <div class="content">
      <!-- TABS -->
      <div class="tabs-bar" id="tabsBar">
        <button class="add-tab-btn" onclick="openAddTabModal()" title="Nueva ronda">＋</button>
      </div>

      <!-- ARENA -->
      <div class="empty-state" id="emptyState" style="flex:1;display:flex;">
        <div class="empty-icon">🏆</div>
        <h3>Sin rondas</h3>
        <p>Añade jugadores y crea la primera ronda para empezar el draft</p>
        <button class="btn btn-gold" onclick="openAddTabModal()">Crear Ronda 1</button>
      </div>
      <div class="arena" id="arena" style="display:none;"></div>
    </div>
  </div>

  <!-- MODAL ADD TAB -->
  <div class="modal-overlay" id="addTabModal">
    <div class="modal">
      <h2>🏆 NUEVA RONDA</h2>
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label style="font-size:12px;color:var(--text2);margin-bottom:6px;display:block;">Nombre de la ronda</label>
          <input type="text" class="text-input" id="tabNameInput" placeholder="Ej: Ronda 1, Semifinal..."
            style="width:100%" onkeydown="if(event.key==='Enter')confirmAddTab()">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('addTabModal')">Cancelar</button>
        <button class="btn btn-gold" onclick="confirmAddTab()">Crear Ronda</button>
      </div>
    </div>
  </div>

  <script>
    // ─── STATE ───────────────────────────────────────────────────────────────────
    let state = {
      players: [],    // [{id, name}]
      tabs: [],       // [{id, name, matchups: [{id, slots:[playerId|null, playerId|null]}], playerNames:{id:name}}]
      activeTab: null,
      allPokemon: [],
      pokemonMap: {},  // name -> {name, sprite}
      picks: {},       // picks[tabId][playerId] = [pokemonName x6]
      bans: {}         // bans[tabId][playerId] = pokemonName|null
    };

    let dragData = null;
    let nextId = 1;
    const genId = () => 'id_' + (nextId++);

    // ─── GENERACIONES por rango de ID nacional ───────────────────────────────────
    const GEN_RANGES = [
      { gen: 1, min: 1, max: 151 },
      { gen: 2, min: 152, max: 251 },
      { gen: 3, min: 252, max: 386 },
      { gen: 4, min: 387, max: 493 },
      { gen: 5, min: 494, max: 649 },
      { gen: 6, min: 650, max: 721 },
      { gen: 7, min: 722, max: 809 },
      { gen: 8, min: 810, max: 905 },
      { gen: 9, min: 906, max: 1025 },
    ];
    const GEN_NAMES = ['', 'Kanto', 'Johto', 'Hoenn', 'Sinnoh', 'Teselia', 'Kalos', 'Alola', 'Galar', 'Paldea'];

    function getPokemonGen(pokemonId) {
      const id = parseInt(pokemonId);
      for (const r of GEN_RANGES) {
        if (id >= r.min && id <= r.max) return r.gen;
      }
      return 0; // formas especiales / fuera de rango
    }

    // ─── POKEMON API ─────────────────────────────────────────────────────────────
    async function loadPokemon() {
      setLoading(10);
      try {
        const r = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025&offset=0');
        const d = await r.json();
        setLoading(60);
        state.allPokemon = d.results.map(p => p.name).sort();
        d.results.forEach(p => {
          const id = parseInt(p.url.split('/').filter(Boolean).pop());
          state.pokemonMap[p.name] = {
            name: p.name,
            sprite: `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`,
            id,
            gen: getPokemonGen(id)
          };
        });
        setLoading(100);
        setTimeout(() => setLoading(0), 500);
        renderArena();
      } catch (e) {
        console.error(e);
        setLoading(0);
      }
    }

    function setLoading(pct) {
      const bar = document.getElementById('loadingBar');
      bar.style.width = pct + '%';
      if (pct === 0) bar.style.opacity = '0';
      else bar.style.opacity = '1';
    }

    // ─── PLAYERS ─────────────────────────────────────────────────────────────────
    function addPlayer() {
      const input = document.getElementById('newPlayerName');
      const name = input.value.trim();
      if (!name) return;
      const player = { id: genId(), name };
      state.players.push(player);
      // Add to all tabs
      state.tabs.forEach(tab => {
        tab.playerNames[player.id] = name;
        if (!state.picks[tab.id]) state.picks[tab.id] = {};
        state.picks[tab.id][player.id] = [null, null, null, null, null, null];
        if (!state.bans[tab.id]) state.bans[tab.id] = {};
        state.bans[tab.id][player.id] = null;
      });
      input.value = '';
      renderSidebar();
      renderArena();
    }

    function removePlayer(pid) {
      state.players = state.players.filter(p => p.id !== pid);
      // Remove from matchup slots
      state.tabs.forEach(tab => {
        tab.matchups.forEach(m => {
          m.slots = m.slots.map(s => s === pid ? null : s);
        });
        delete tab.playerNames[pid];
        if (state.picks[tab.id]) delete state.picks[tab.id][pid];
      });
      renderSidebar();
      renderArena();
    }

    function updatePlayerName(pid, name) {
      const p = state.players.find(x => x.id === pid);
      if (p) p.name = name;
      state.tabs.forEach(tab => {
        tab.playerNames[pid] = name;
      });
      // Update avatar letters etc without full re-render
      document.querySelectorAll(`[data-player-avatar="${pid}"]`).forEach(el => {
        el.textContent = name.charAt(0).toUpperCase() || '?';
      });
      document.querySelectorAll(`[data-player-name-display="${pid}"]`).forEach(el => {
        el.textContent = name || 'Jugador';
      });
    }

    // Per-tab player name override
    function updateTabPlayerName(tabId, pid, name) {
      const tab = state.tabs.find(t => t.id === tabId);
      if (tab) tab.playerNames[pid] = name;
    }

    function getPlayerName(tabId, pid) {
      const tab = state.tabs.find(t => t.id === tabId);
      if (tab && tab.playerNames[pid] !== undefined) return tab.playerNames[pid];
      const p = state.players.find(x => x.id === pid);
      return p ? p.name : 'Jugador';
    }

    // ─── TABS ─────────────────────────────────────────────────────────────────────
    function openAddTabModal() {
      const num = state.tabs.length + 1;
      document.getElementById('tabNameInput').value = `Ronda ${num}`;
      openModal('addTabModal');
      setTimeout(() => document.getElementById('tabNameInput').select(), 50);
    }

    function confirmAddTab() {
      const name = document.getElementById('tabNameInput').value.trim() || `Ronda ${state.tabs.length + 1}`;
      addTab(name);
      closeModal('addTabModal');
    }

    function addTab(name) {
      const tabId = genId();
      const prevTab = state.tabs.length > 0 ? state.tabs[state.tabs.length - 1] : null;

      // Copy player names from previous tab (or base)
      const playerNames = {};
      state.players.forEach(p => {
        playerNames[p.id] = prevTab ? (prevTab.playerNames[p.id] || p.name) : p.name;
      });

      const tab = { id: tabId, name, matchups: [], playerNames };

      // Initialize picks and bans for this tab
      if (!state.picks[tabId]) state.picks[tabId] = {};
      if (!state.bans[tabId]) state.bans[tabId] = {};
      state.players.forEach(p => {
        state.picks[tabId][p.id] = [null, null, null, null, null, null];
        state.bans[tabId][p.id] = null;
      });

      state.tabs.push(tab);
      state.activeTab = tabId;
      hideEmptyState();
      renderTabs();
      renderArena();
    }

    function removeTab(tabId) {
      if (state.tabs.length === 1) {
        if (!confirm('¿Eliminar la única ronda?')) return;
      }
      state.tabs = state.tabs.filter(t => t.id !== tabId);
      delete state.picks[tabId];
      delete state.bans[tabId];
      if (state.activeTab === tabId) {
        state.activeTab = state.tabs.length > 0 ? state.tabs[state.tabs.length - 1].id : null;
      }
      if (state.tabs.length === 0) showEmptyState();
      renderTabs();
      renderArena();
    }

    function switchTab(tabId) {
      state.activeTab = tabId;
      renderTabs();
      renderArena();
    }

    // ─── MATCHUPS ─────────────────────────────────────────────────────────────────
    function addMatchup(tabId) {
      const tab = state.tabs.find(t => t.id === tabId);
      if (!tab) return;
      tab.matchups.push({ id: genId(), slots: [null, null] });
      renderArena();
    }

    function removeMatchup(tabId, matchupId) {
      const tab = state.tabs.find(t => t.id === tabId);
      if (!tab) return;
      tab.matchups = tab.matchups.filter(m => m.id !== matchupId);
      renderArena();
    }

    // ─── PICKS ───────────────────────────────────────────────────────────────────
    // Get all pokemon picked by a player across ALL previous tabs
    function getPlayerPastPicks(tabId, pid) {
      const picks = new Set();
      const tabIdx = state.tabs.findIndex(t => t.id === tabId);
      for (let i = 0; i < tabIdx; i++) {
        const tId = state.tabs[i].id;
        if (state.picks[tId] && state.picks[tId][pid]) {
          state.picks[tId][pid].forEach(pk => { if (pk) picks.add(pk); });
        }
      }
      return picks;
    }

    // Get all pokemon picked by ALL players in THIS tab (for global exclusion in same round)
    function getTabAllPicks(tabId) {
      const picks = {};
      if (!state.picks[tabId]) return picks;
      Object.entries(state.picks[tabId]).forEach(([pid, arr]) => {
        arr.forEach((pk, i) => {
          if (pk) picks[pk] = pid;
        });
      });
      return picks;
    }

    // Get all banned pokemon in a tab as a Set
    function getTabBans(tabId) {
      const banned = new Set();
      if (!state.bans[tabId]) return banned;
      Object.values(state.bans[tabId]).forEach(pk => { if (pk) banned.add(pk); });
      return banned;
    }

    function setBan(tabId, pid, pokemon) {
      if (!state.bans[tabId]) state.bans[tabId] = {};
      state.bans[tabId][pid] = pokemon || null;
      renderArena();
    }


    function setPick(tabId, pid, slot, pokemon) {
      if (!state.picks[tabId]) state.picks[tabId] = {};
      if (!state.picks[tabId][pid]) state.picks[tabId][pid] = [null, null, null, null, null, null];
      state.picks[tabId][pid][slot] = pokemon || null;
      // Re-render picks for this tab (other players' selects need updating)
      renderArena();
    }

    // ─── AVAILABLE POKEMON for a player in a slot ───────────────────────────────
    // Returns [{name, revived, genBlocked, gen, banned}]
    function getAvailablePokemon(tabId, pid, slotIdx) {
      const pastPicks = getPlayerPastPicks(tabId, pid);
      const tabPicks = getTabAllPicks(tabId);
      const tabBans = getTabBans(tabId);
      const myCurrentPicks = (state.picks[tabId] && state.picks[tabId][pid]) ? state.picks[tabId][pid] : [];
      const currentSelected = myCurrentPicks[slotIdx];

      // Gens ya usadas en OTROS slots de esta ronda
      const usedGens = new Set();
      myCurrentPicks.forEach((pk, i) => {
        if (i !== slotIdx && pk && state.pokemonMap[pk]?.gen) {
          usedGens.add(state.pokemonMap[pk].gen);
        }
      });

      return state.allPokemon
        .filter(name => {
          if (name === currentSelected) return true;
          if (tabPicks[name] && tabPicks[name] !== pid) return false;
          for (let i = 0; i < myCurrentPicks.length; i++) {
            if (i !== slotIdx && myCurrentPicks[i] === name) return false;
          }
          return true;
        })
        .map(name => {
          const pkmn = state.pokemonMap[name];
          const gen = pkmn?.gen || 0;
          const genBlocked = gen > 0 && usedGens.has(gen) && name !== currentSelected;
          const banned = tabBans.has(name) && name !== currentSelected;
          return { name, revived: pastPicks.has(name), gen, genBlocked, banned };
        });
    }

    // ─── RENDER ──────────────────────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('playersList');
      if (state.players.length === 0) {
        list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text3);font-size:13px;">Añade jugadores para empezar</div>`;
        return;
      }
      list.innerHTML = state.players.map(p => `
    <div class="player-item" draggable="true"
      ondragstart="onDragStart(event,'player','${p.id}')"
      ondragend="onDragEnd(event)">
      <div class="player-avatar" data-player-avatar="${p.id}">${p.name.charAt(0).toUpperCase() || '?'}</div>
      <input class="player-name-input" value="${escHtml(p.name)}"
        onchange="updatePlayerName('${p.id}',this.value)"
        oninput="updatePlayerName('${p.id}',this.value)"
        placeholder="Nombre..."
        draggable="false" onclick="event.stopPropagation()">
      <button class="remove-player-btn" onclick="removePlayer('${p.id}')" title="Eliminar jugador">×</button>
    </div>
  `).join('');
    }

    function renderTabs() {
      const bar = document.getElementById('tabsBar');
      bar.innerHTML = state.tabs.map(tab => `
    <button class="tab-btn ${tab.id === state.activeTab ? 'active' : ''}"
      onclick="switchTab('${tab.id}')">
      ${escHtml(tab.name)}
      <span class="tab-badge">${tab.matchups.length}</span>
      <span class="tab-close" onclick="event.stopPropagation();removeTab('${tab.id}')" title="Eliminar ronda">×</span>
    </button>
  `).join('') + `<button class="add-tab-btn" onclick="openAddTabModal()" title="Nueva ronda">＋</button>`;
    }

    function renderArena() {
      if (!state.activeTab || state.tabs.length === 0) { showEmptyState(); return; }
      hideEmptyState();
      const tab = state.tabs.find(t => t.id === state.activeTab);
      if (!tab) return;

      const arena = document.getElementById('arena');

      // Find unassigned players
      const assignedPlayers = new Set();
      tab.matchups.forEach(m => m.slots.forEach(s => { if (s) assignedPlayers.add(s); }));
      const unassigned = state.players.filter(p => !assignedPlayers.has(p.id));

      let html = '';

      // Unassigned section
      if (unassigned.length > 0 || state.players.length === 0) {
        html += `<div class="unassigned-section">
      <div class="unassigned-header">⚡ JUGADORES SIN ASIGNAR — Arrastra a un enfrentamiento</div>
      <div class="unassigned-grid" id="unassignedGrid"
        ondragover="event.preventDefault()"
        ondrop="onDropUnassigned(event,'${tab.id}')">
        ${unassigned.length === 0 ? '<span style="color:var(--text3);font-size:13px;">Todos los jugadores asignados</span>' :
            unassigned.map(p => `
            <div class="unassigned-player" draggable="true"
              ondragstart="onDragStart(event,'player','${p.id}')"
              ondragend="onDragEnd(event)">
              <div class="player-avatar" style="width:28px;height:28px;font-size:12px;">${getPlayerName(tab.id, p.id).charAt(0).toUpperCase()}</div>
              <span style="font-size:13px;font-weight:600;">${escHtml(getPlayerName(tab.id, p.id))}</span>
            </div>
          `).join('')}
      </div>
    </div>`;
      }

      // Matchups
      tab.matchups.forEach((matchup, mi) => {
        html += renderMatchup(tab, matchup, mi);
      });

      // Add matchup button
      html += `<button class="add-matchup-btn" onclick="addMatchup('${tab.id}')">
    + Añadir Enfrentamiento
  </button>`;

      arena.innerHTML = html;
      renderTabs();
    }

    function renderMatchup(tab, matchup, idx) {
      const slots = [0, 1].map(si => {
        const pid = matchup.slots[si];
        if (!pid) {
          return `<div class="slot" data-tab="${tab.id}" data-matchup="${matchup.id}" data-slot="${si}"
        ondragover="onDragOverSlot(event)"
        ondragleave="onDragLeaveSlot(event)"
        ondrop="onDropSlot(event,'${tab.id}','${matchup.id}','${si}')">
        <div class="slot-placeholder">
          <span class="ph-icon">👤</span>
          <span>Arrastra un jugador aquí</span>
        </div>
      </div>`;
        }

        const name = getPlayerName(tab.id, pid);
        const myPicks = state.picks[tab.id]?.[pid] || [null, null, null, null, null, null];

        // Ban section vars — computed outside template literal to avoid parser issues
        const bannedPk = (state.bans[tab.id] && state.bans[tab.id][pid]) ? state.bans[tab.id][pid] : null;
        const banSprite = bannedPk && state.pokemonMap[bannedPk] ? state.pokemonMap[bannedPk].sprite : '';
        const banPickerId = ('banpicker_' + tab.id + '_' + pid).replace(/[^a-z0-9_]/gi, '_');
        const banSectionHtml = `<div class="ban-section">
      <span class="ban-label">🚫 BAN</span>
      <div class="ban-slot ${bannedPk ? 'has-ban' : ''}"
        id="${banPickerId}"
        onclick="toggleBanPicker('${banPickerId}','${tab.id}','${pid}',event)">
        ${bannedPk && banSprite ? `<img class="ban-pokemon-img" src="${banSprite}" alt="${bannedPk}" onerror="this.style.display='none'">` : ''}
        ${bannedPk ? `<span class="ban-name">${capitalize(bannedPk)}</span>` : `<span class="ban-placeholder">Elegir pokémon a banear...</span>`}
      </div>
      ${bannedPk ? `<button class="ban-clear" onclick="event.stopPropagation();setBan('${tab.id}','${pid}',null)" title="Quitar ban">×</button>` : ''}
    </div>`;
        const picksHtml = [0, 1, 2, 3, 4, 5].map(pi => {
          const selected = myPicks[pi];
          const available = getAvailablePokemon(tab.id, pid, pi);
          const sprite = selected && state.pokemonMap[selected] ? state.pokemonMap[selected].sprite : '';
          const pickerId = `picker_${tab.id}_${pid}_${pi}`.replace(/[^a-z0-9_]/gi, '_');

          return `<div class="pick-slot">
        <span class="pick-num">${pi + 1}</span>
        ${sprite ? `<img class="pick-pokemon-img" src="${sprite}" alt="${selected}" title="${capitalize(selected)}" onerror="this.style.display='none'">` : `<div style="height:52px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0.2">?</div>`}
        <div class="pokepicker" id="${pickerId}">
          <button class="pokepicker-trigger ${selected ? 'has-value' : ''}"
            onclick="togglePicker('${pickerId}','${tab.id}','${pid}','${pi}',event)">
            ${selected ? capitalize(selected) : '— elegir —'}
          </button>
        </div>
      </div>`;
        }).join('');

        return `<div class="slot"
      ondragover="onDragOverSlot(event)"
      ondragleave="onDragLeaveSlot(event)"
      ondrop="onDropSlot(event,'${tab.id}','${matchup.id}','${si}')">
      <div class="player-card" draggable="true"
        ondragstart="onDragStart(event,'assigned','${pid}','${tab.id}','${matchup.id}','${si}')"
        ondragend="onDragEnd(event)">
        <div class="card-header">
          <div class="card-avatar" data-player-avatar="${pid}">${name.charAt(0).toUpperCase()}</div>
          <div>
            <input class="player-name-input" value="${escHtml(name)}" style="font-size:14px"
              oninput="updateTabPlayerName('${tab.id}','${pid}',this.value);document.querySelectorAll('[data-player-name-display=\\'${pid}\\']').forEach(e=>e.textContent=this.value)"
              onchange="updateTabPlayerName('${tab.id}','${pid}',this.value)"
              draggable="false" onclick="event.stopPropagation()"
              placeholder="Nombre...">
          </div>
          <button class="remove-player-btn" style="margin-left:auto"
            onclick="removeFromSlot('${tab.id}','${matchup.id}','${si}')" title="Quitar del enfrentamiento">×</button>
        </div>
        <div class="card-body">
          <div class="picks-grid">${picksHtml}</div>
        </div>
        ${banSectionHtml}
      </div>
    </div>`;
      });

      return `<div class="matchup">
    <div class="matchup-header">
      ENFRENTAMIENTO ${idx + 1}
      <span style="margin-left:auto">
        <button class="btn btn-danger btn-sm" onclick="removeMatchup('${tab.id}','${matchup.id}')">Eliminar</button>
      </span>
    </div>
    <div class="matchup-slots">
      ${slots[0]}
      <div class="vs-divider"><span class="vs-text">VS</span></div>
      ${slots[1]}
    </div>
  </div>`;
    }

    function removeFromSlot(tabId, matchupId, slotIdx) {
      const tab = state.tabs.find(t => t.id === tabId);
      if (!tab) return;
      const m = tab.matchups.find(x => x.id === matchupId);
      if (!m) return;
      m.slots[slotIdx] = null;
      renderArena();
    }

    // ─── DRAG & DROP ─────────────────────────────────────────────────────────────
    function onDragStart(e, type, pid, tabId, matchupId, slotIdx) {
      dragData = { type, pid, tabId, matchupId, slotIdx: slotIdx !== undefined ? parseInt(slotIdx) : undefined };
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => {
        if (e.target.classList.contains('player-card')) e.target.classList.add('dragging');
        if (e.target.classList.contains('player-item')) e.target.style.opacity = '0.4';
        if (e.target.classList.contains('unassigned-player')) e.target.style.opacity = '0.4';
      }, 0);
    }

    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      e.target.style.opacity = '';
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      dragData = null;
    }

    function onDragOverSlot(e) {
      e.preventDefault();
      e.currentTarget.classList.add('drag-over');
    }

    function onDragLeaveSlot(e) {
      e.currentTarget.classList.remove('drag-over');
    }

    function onDropSlot(e, tabId, matchupId, slotIdx) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      if (!dragData) return;

      const tab = state.tabs.find(t => t.id === tabId);
      if (!tab) return;
      const targetMatchup = tab.matchups.find(m => m.id === matchupId);
      if (!targetMatchup) return;
      const targetSlotIdx = parseInt(slotIdx);
      const pid = dragData.pid;

      // Remove from previous location
      if (dragData.type === 'assigned') {
        const srcTab = state.tabs.find(t => t.id === dragData.tabId);
        if (srcTab) {
          const srcMatchup = srcTab.matchups.find(m => m.id === dragData.matchupId);
          if (srcMatchup) {
            // Swap if target slot is occupied
            const displaced = targetMatchup.slots[targetSlotIdx];
            srcMatchup.slots[dragData.slotIdx] = displaced || null;
          }
        }
      } else {
        // From sidebar or unassigned - clear any previous location in this tab
        tab.matchups.forEach(m => {
          m.slots = m.slots.map(s => s === pid ? null : s);
        });
        // Also handle if player was in source tab matchup (assigned type but different tab? - edge case)
      }

      // Check if player already in target slot (same player)
      if (targetMatchup.slots[targetSlotIdx] === pid) return;

      // Assign
      targetMatchup.slots[targetSlotIdx] = pid;

      renderArena();
    }

    function onDropUnassigned(e, tabId) {
      e.preventDefault();
      if (!dragData || dragData.type !== 'assigned') return;
      const tab = state.tabs.find(t => t.id === tabId);
      if (!tab) return;
      const srcMatchup = tab.matchups.find(m => m.id === dragData.matchupId);
      if (srcMatchup) srcMatchup.slots[dragData.slotIdx] = null;
      renderArena();
    }

    // ─── UTILS ───────────────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function capitalize(s) {
      return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    function showEmptyState() {
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('arena').style.display = 'none';
    }
    function hideEmptyState() {
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('arena').style.display = 'block';
    }

    function exportData() {
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'pokemon-draft.json';
      a.click();
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const imported = JSON.parse(e.target.result);
          // Validate basic structure
          if (!imported.players || !imported.tabs || !imported.picks) {
            alert('Archivo no válido: faltan datos del torneo.');
            return;
          }
          // Restore state (keep pokemonMap and allPokemon already loaded)
          state.players = imported.players || [];
          state.tabs = imported.tabs || [];
          state.picks = imported.picks || {};
          state.activeTab = imported.activeTab || (state.tabs.length > 0 ? state.tabs[0].id : null);
          // Restore nextId to avoid collisions
          let maxId = 0;
          const extractNum = id => parseInt((id || '').replace('id_', '')) || 0;
          state.players.forEach(p => maxId = Math.max(maxId, extractNum(p.id)));
          state.tabs.forEach(t => {
            maxId = Math.max(maxId, extractNum(t.id));
            (t.matchups || []).forEach(m => maxId = Math.max(maxId, extractNum(m.id)));
          });
          nextId = maxId + 1;

          renderSidebar();
          renderTabs();
          renderArena();
        } catch (err) {
          alert('Error al leer el archivo: ' + err.message);
        }
        // Reset input so the same file can be reimportado si hace falta
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('open');
      });
    });

    // ─── POKEPICKER ──────────────────────────────────────────────────────────────
    let activePickerDropdown = null;
    let activePicker = { tabId: null, pid: null, slotIdx: null };

    function toggleBanPicker(pickerId, tabId, pid, event) {
      event.stopPropagation();
      if (activePickerDropdown && activePickerDropdown.dataset.picker === pickerId) {
        closePicker();
        return;
      }
      closePicker();

      // Build available list for ban: all pokemon except already banned by others and already picked in this tab
      const tabBans = getTabBans(tabId);
      const tabPicks = getTabAllPicks(tabId);
      const currentBan = state.bans[tabId]?.[pid] || null;

      const available = state.allPokemon
        .filter(name => {
          if (name === currentBan) return true;
          if (tabBans.has(name)) return false; // ya baneado por otro
          return true;
        })
        .map(name => {
          const alreadyPicked = !!(tabPicks[name]);
          return { name, revived: false, gen: state.pokemonMap[name]?.gen || 0, genBlocked: false, banned: false, alreadyPicked };
        });

      activePicker = { tabId, pid, slotIdx: 'ban' };

      const trigger = document.getElementById(pickerId);
      const dropdown = document.createElement('div');
      dropdown.className = 'pokepicker-dropdown open';
      dropdown.dataset.picker = pickerId;
      dropdown.dataset.isBan = '1';

      dropdown.innerHTML = `
    <div style="padding:6px 10px;font-size:10px;font-family:'Press Start 2P',monospace;color:#ef4444;border-bottom:1px solid var(--border);background:rgba(239,68,68,0.08)">🚫 BANEAR POKÉMON</div>
    <input class="pokepicker-search" type="text" placeholder="Buscar pokémon..." autocomplete="off" spellcheck="false">
    <div class="pokepicker-list" id="pklist_${pickerId}"></div>
    ${currentBan ? `<button class="pokepicker-clear" onclick="setBan('${tabId}','${pid}',null)">✕ Quitar ban</button>` : ''}
  `;

      document.body.appendChild(dropdown);
      activePickerDropdown = dropdown;
      positionDropdown(dropdown, trigger);

      renderBanPickerList(dropdown, available, currentBan, tabId, pid, '');

      const searchInput = dropdown.querySelector('.pokepicker-search');
      searchInput.focus();
      searchInput.addEventListener('input', () => {
        renderBanPickerList(dropdown, available, currentBan, tabId, pid, searchInput.value.toLowerCase().trim());
      });
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closePicker(); e.stopPropagation(); }
      });
    }

    function renderBanPickerList(dropdown, available, selected, tabId, pid, query) {
      const list = dropdown.querySelector('.pokepicker-list');
      const filtered = query ? available.filter(p => p.name.includes(query)) : available;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="pokepicker-empty">Sin resultados</div>`;
        return;
      }

      // Already picked ones go at the bottom
      const sorted = [...filtered].sort((a, b) => (a.alreadyPicked ? 1 : 0) - (b.alreadyPicked ? 1 : 0));

      list.innerHTML = sorted.slice(0, 100).map(({ name: pk, alreadyPicked }) => {
        const sprite = state.pokemonMap[pk]?.sprite || '';
        return `<div class="pokepicker-item ${pk === selected ? 'selected' : ''}"
      onclick="closePicker();setBan('${tabId}','${pid}','${pk}')">
      ${sprite ? `<img src="${sprite}" alt="${pk}" onerror="this.style.display='none'">` : '<div style="width:28px"></div>'}
      <span style="flex:1;text-transform:capitalize">${capitalize(pk)}</span>
      ${alreadyPicked ? `<span style="font-size:10px;color:var(--text3);flex-shrink:0">ya pickeado</span>` : ''}
    </div>`;
      }).join('') + (filtered.length > 100 ? `<div class="pokepicker-empty">+${filtered.length - 100} más — filtra por nombre</div>` : '');
    }


    function togglePicker(pickerId, tabId, pid, slotIdx, event) {
      event.stopPropagation();
      if (activePickerDropdown && activePickerDropdown.dataset.picker === pickerId) {
        closePicker();
        return;
      }
      closePicker();
      openPicker(pickerId, tabId, pid, parseInt(slotIdx));
    }

    function openPicker(pickerId, tabId, pid, slotIdx) {
      const trigger = document.querySelector(`#${pickerId} .pokepicker-trigger`);
      if (!trigger) return;

      activePicker = { tabId, pid, slotIdx };
      const available = getAvailablePokemon(tabId, pid, slotIdx);
      const selected = state.picks[tabId]?.[pid]?.[slotIdx] || null;

      // Build dropdown
      const dropdown = document.createElement('div');
      dropdown.className = 'pokepicker-dropdown open';
      dropdown.dataset.picker = pickerId;

      dropdown.innerHTML = `
    <input class="pokepicker-search" type="text" placeholder="Buscar pokémon..." autocomplete="off" spellcheck="false">
    <div class="pokepicker-list" id="pklist_${pickerId}"></div>
    ${selected ? `<button class="pokepicker-clear" onclick="clearPick('${tabId}','${pid}','${slotIdx}')">✕ Quitar selección</button>` : ''}
  `;

      document.body.appendChild(dropdown);
      activePickerDropdown = dropdown;

      // Position
      positionDropdown(dropdown, trigger);

      // Render list
      renderPickerList(dropdown, pickerId, available, selected, tabId, pid, slotIdx, '');

      // Search input
      const searchInput = dropdown.querySelector('.pokepicker-search');
      searchInput.focus();
      searchInput.addEventListener('input', () => {
        renderPickerList(dropdown, pickerId, available, selected, tabId, pid, slotIdx, searchInput.value.toLowerCase().trim());
      });
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closePicker(); e.stopPropagation(); }
      });
    }

    function positionDropdown(dropdown, trigger) {
      const rect = trigger.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const spaceAbove = rect.top;
      const dropH = 280;

      dropdown.style.left = Math.min(rect.left, window.innerWidth - 210) + 'px';
      if (spaceBelow >= dropH || spaceBelow >= spaceAbove) {
        dropdown.style.top = (rect.bottom + 4) + 'px';
      } else {
        dropdown.style.top = (rect.top - dropH - 4) + 'px';
      }
    }

    function renderPickerList(dropdown, pickerId, available, selected, tabId, pid, slotIdx, query) {
      const list = dropdown.querySelector('.pokepicker-list');
      const filtered = query
        ? available.filter(p => p.name.includes(query))
        : available;

      if (filtered.length === 0) {
        list.innerHTML = `<div class="pokepicker-empty">Sin resultados para "${query}"</div>`;
        return;
      }

      // Orden: normal → revivido → bloqueado por gen
      const sorted = [...filtered].sort((a, b) => {
        const rankA = a.genBlocked ? 2 : a.revived ? 1 : 0;
        const rankB = b.genBlocked ? 2 : b.revived ? 1 : 0;
        return rankA - rankB;
      });

      list.innerHTML = sorted.slice(0, 100).map(({ name: pk, revived, genBlocked, gen }) => {
        const sprite = state.pokemonMap[pk]?.sprite || '';
        const genName = gen > 0 ? GEN_NAMES[gen] : '';
        const badges = [];
        if (revived) badges.push(`<span style="font-size:10px;font-weight:700;color:#f59e0b;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);padding:1px 6px;border-radius:20px;flex-shrink:0">💊 Revivido</span>`);
        if (genBlocked) badges.push(`<span style="font-size:10px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);padding:1px 6px;border-radius:20px;flex-shrink:0" title="Ya tienes un pokémon de ${genName}">🚫 ${genName}</span>`);
        if (banned) badges.push(`<span style="font-size:10px;font-weight:700;color:#ef4444;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);padding:1px 6px;border-radius:20px;flex-shrink:0">🚫 Baneado</span>`);

        const blocked = genBlocked || banned;
        return `<div class="pokepicker-item ${pk === selected ? 'selected' : ''}"
      onclick="${blocked ? `showGenBlockedMsg('${banned ? 'Este pokémon está baneado esta ronda' : `Ya tienes un pokémon de ${genName}`}')` : `selectPick('${tabId}','${pid}','${slotIdx}','${pk}')`}"
      style="${blocked ? 'opacity:0.45;cursor:not-allowed;' : ''}">
      ${sprite ? `<img src="${sprite}" alt="${pk}" onerror="this.style.display='none'">` : '<div style="width:28px"></div>'}
      <span style="flex:1;text-transform:capitalize">${capitalize(pk)}</span>
      ${badges.join('')}
    </div>`;
      }).join('') + (filtered.length > 100 ? `<div class="pokepicker-empty">+${filtered.length - 100} más — escribe para filtrar</div>` : '');
    }

    function showGenBlockedMsg(genName) {
      // Mini toast en el dropdown
      const existing = document.querySelector('.gen-blocked-toast');
      if (existing) return;
      const toast = document.createElement('div');
      toast.className = 'gen-blocked-toast';
      toast.textContent = `Ya tienes un pokémon de ${genName} en este equipo`;
      toast.style.cssText = 'position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#1e1e40;border:1px solid rgba(239,68,68,0.5);color:#fca5a5;font-size:13px;padding:8px 16px;border-radius:8px;z-index:9999;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4)';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function selectPick(tabId, pid, slotIdx, pokemon) {
      closePicker();
      setPick(tabId, pid, parseInt(slotIdx), pokemon);
    }

    function clearPick(tabId, pid, slotIdx) {
      closePicker();
      setPick(tabId, pid, parseInt(slotIdx), null);
    }

    function closePicker() {
      if (activePickerDropdown) {
        activePickerDropdown.remove();
        activePickerDropdown = null;
      }
      activePicker = { tabId: null, pid: null, slotIdx: null };
    }

    // Close picker on outside click or scroll
    document.addEventListener('click', e => {
      if (activePickerDropdown && !activePickerDropdown.contains(e.target)) closePicker();
    });
    document.addEventListener('scroll', closePicker, true);

    // ─── INIT ─────────────────────────────────────────────────────────────────────
    renderSidebar();
    renderTabs();
    loadPokemon();
  </script>
</body>

</html>
